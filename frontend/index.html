<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept Art Portfolio</title>
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/gallery.css">
    <link rel="stylesheet" href="./assets/css/modal.css">
</head>

<body>
    <!-- The container where the collage will be injected -->
    <main id="collage-container" class="collage"></main>

    <!-- Back to top button -->
    <button id="back-to-top" class="back-to-top" aria-label="Volver arriba">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 15l-6-6-6 6" />
        </svg>
    </button>

    <!-- Artwork Detail Modal -->
    <div id="artwork-modal" class="modal hidden">
        <div class="modal__overlay" id="modal-overlay"></div>
        <div class="modal__content">
            <button id="modal-close" class="modal__close" aria-label="Cerrar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <button id="modal-share" class="modal__share" aria-label="Compartir">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                <span id="modal-share-text" class="modal__share-text hidden">Copied!</span>
            </button>
            <div class="modal__image-pane">
                <button id="modal-prev" class="modal__arrow modal__arrow--left hidden" aria-label="Anterior">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <img id="modal-image" src="" alt="Artwork">
                <button id="modal-next" class="modal__arrow modal__arrow--right hidden" aria-label="Siguiente">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
            <div class="modal__text-pane">
                <h2 id="modal-title" class="modal__title"></h2>
                <span id="modal-category" class="modal__category"></span>
                <p id="modal-description" class="modal__description"></p>
            </div>
        </div>
    </div>

    <!-- Fullscreen Image View -->
    <div id="fullscreen-view" class="fullscreen hidden">
        <button id="fullscreen-close" class="fullscreen__close" aria-label="Cerrar pantalla completa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <img id="fullscreen-image" class="fullscreen__image" src="" alt="Fullscreen Artwork">
    </div>

    <!-- Load the main script as an ES6 module -->
    <script type="module" src="./js/main.js"></script>
</body>

</html>
